# Render Blueprint — free web service for the World Cup 2026 pool.
# Deploy: push this repo to GitHub, then in Render: New + → Blueprint → pick the repo.
services:
  - type: web
    name: worldcup-2026-pool
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_CODE
        sync: false        # set your own admin passcode in the Render dashboard
      - key: DATABASE_URL
        sync: false        # paste your Neon (or other) Postgres connection string
